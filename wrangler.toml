# Bloom Filter false positive rate
# Restored to 0.0001 (1 in 10,000) — safe now because each cron trigger
# processes only ONE list at a time (~100-150k domains), dramatically reducing
# per-trigger CPU usage vs. the old all-at-once approach.
BLOOM_FALSE_POSITIVE_RATE=0.0001

# Maximum total domains included in a profile's Bloom Filter (across all lists).
# The Bloom is pre-sized to this value at the start of each sync cycle.
# 500k domains @ p=0.0001: bitArray ≈ 1.2 MB (3 × 512KB D1 chunks)
MAX_SYNC_DOMAINS=500000

# Maximum domains processed from a single list per cron trigger.
# Each trigger: ~150k × 13 hashes = ~1.95M hash ops — well within CPU budget.
MAX_LIST_DOMAINS=150000

# Hard cap on log retention days (overrides per-profile user setting).
# Prevents high-retention profiles (e.g. 360 days) from filling up D1's 500 MB limit.
MAX_LOG_RETENTION_DAYS=90

NORMAL_USER_MAX_LOG_RETENTION_DAYS=7

# Hard cap on log row count per profile. Acts as a circuit-breaker when write
# rate temporarily exceeds cleanup rate (e.g. high-traffic profiles).
MAX_LOGS_PER_PROFILE=500000
