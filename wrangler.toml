name = "obex-dns"
main = "src/index.ts"
compatibility_date = "2026-02-28"
compatibility_flags = ["nodejs_compat"]
# account_id = ""
minify = true
# workers_dev = false
preview_urls = false

[build]
command = "npm run build"

[assets]
directory = "./static"
binding = "ASSETS"

# D1 Database for Profiles, Rules and Logs
[[d1_databases]]
binding = "DB"
database_name = "obex_db"
# This field must be filled with your database ID; otherwise the deployment will fail.
database_id = "13d8c24f-064a-40d6-8b10-fa70bb3f79ab"

[triggers]
crons = ["* * * * *"]

[placement]
# mode = "targeted"
# region = "aws:ap-southeast-1"
mode = "smart"

[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true
head_sampling_rate = 0.001

[observability.traces]
enabled = true
head_sampling_rate = 0.01

[vars]
# Maximum number of access points allowed per profile
MAX_ACCESS_POINTS_PER_PROFILE = 100
# Maximum number of profiles allowed per user
MAX_PROFILES_PER_USER = 10
# Used to resolve DoH domains
SUBSTITUTE_DOMAIN="www.okx.com"
IP_REGION_CN = """
[
  {
    "ip": "198.41.222.102",
    "area": "SG"
  },
  {
    "ip": "173.245.59.246",
    "area": "SG"
  },
  {
    "ip": "104.18.47.174",
    "area": "HK"
  },
  {
    "ip": "104.19.50.3",
    "area": "HK"
  }
]
"""
# Time constants
# Session duration for authenticated users by default (in minutes)
DEFAULT_SESSION_EXPIRATION_MINUTES=1440
# Session duration for authenticated users when keeping logged in option is selected (in days)
OPTIONAL_SESSION_EXPIRATION_DAYS=7
# Access Token expiration time (in minutes)
ACCESS_TOKEN_EXPIRATION_MINUTES=1
# Maximum allowed distance (in km) between session login and current request
SESSION_GEO_DISTANCE_KM=50
# TTL for temporary pre-auth session during login (in seconds)
PREAUTH_TTL_SECONDS=300
# In-memory retention time for profile bloom filters (in milliseconds)
BLOOM_MEM_TTL=600000
# Timeout threshold when downloading upstream blocklists (in milliseconds)
SYNC_TIMEOUT_MS=30000
# Number of days of inactivity before an account is cleared by cron jobs
INACTIVITY_THRESHOLD_DAYS=180
# Throttle interval for updating profile "last active" status (in seconds)
THROTTLE_ACTIVE_SEC=3600
# Minimum interval between automated blocklist profile syncs (in seconds)
SYNC_PROFILE_INTERVAL_SEC=86400

